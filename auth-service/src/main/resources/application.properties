# Auth Service - Port 8081
server.port=8081
spring.application.name=auth-service
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# JWT Configuration
# JWT secret (dev local): fixed key to keep all services aligned.
app.jwt.secret=dGhpcyBpcyBhIDI1Ni1iaXQgc2VjcmV0IGtleSBmb3Igand0IHRlc3Rpbmc=
app.jwt.access-token-expiration=3600000
app.jwt.refresh-token-expiration=86400000

# Login lockout (blocage après tentatives échouées)
app.security.max-login-attempts=5
app.security.lockout-duration-minutes=15

# OAuth2/SSO (optionnel - configurer pour Google/Microsoft)
# spring.security.oauth2.client.registration.google.client-id=
# spring.security.oauth2.client.registration.google.client-secret=
# spring.security.oauth2.client.registration.microsoft.client-id=
# spring.security.oauth2.client.registration.microsoft.client-secret=

# Actuator & Prometheus
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=when_authorized
management.metrics.export.prometheus.enabled=true
