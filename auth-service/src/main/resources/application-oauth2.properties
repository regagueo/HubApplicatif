# OAuth2/SSO - Copier dans application.properties et remplir les valeurs
# Pour activer : spring.profiles.include=oauth2

app.oauth2.enabled=true

# Google OAuth2
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=email,profile

# Microsoft OAuth2
spring.security.oauth2.client.registration.microsoft.client-id=${MICROSOFT_CLIENT_ID:}
spring.security.oauth2.client.registration.microsoft.client-secret=${MICROSOFT_CLIENT_SECRET:}
spring.security.oauth2.client.registration.microsoft.scope=openid,profile,email
spring.security.oauth2.client.provider.microsoft.issuer-uri=https://login.microsoftonline.com/common/v2.0
