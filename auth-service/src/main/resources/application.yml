app:
  oauth2:
    enabled: true
    frontend-base-url: http://localhost:3001
  azure:
    tenant-id: 262b9ccd-16f7-4273-84b9-28917381f39d
    groups:
      rh: ${AZURE_GROUP_RH:4f76fe10-27df-47ce-8442-2f7eab692d2c}
      # placeholders non activés (mapping futur)
      employee: ${AZURE_GROUP_EMPLOYEE:}
      manager: ${AZURE_GROUP_MANAGER:}
      dg: ${AZURE_GROUP_DG:}
      admin: ${AZURE_GROUP_ADMIN:}

spring:
  security:
    oauth2:
      client:
        registration:
          azure:
            client-id: c5b072b4-0af7-4b1d-9ee3-186e9a935930
            client-secret: ${AZURE_CLIENT_SECRET:}
            authorization-grant-type: authorization_code
            redirect-uri: http://localhost:8081/login/oauth2/code/azure
            provider: azure
            client-name: Azure AD
            scope:
              - openid
              - profile
              - email
        provider:
          azure:
            authorization-uri: https://login.microsoftonline.com/${app.azure.tenant-id}/oauth2/v2.0/authorize
            token-uri: https://login.microsoftonline.com/${app.azure.tenant-id}/oauth2/v2.0/token
            jwk-set-uri: https://login.microsoftonline.com/${app.azure.tenant-id}/discovery/v2.0/keys
            user-info-uri: https://graph.microsoft.com/oidc/userinfo
            user-name-attribute: sub
